<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Mind Forge — Build Mental Strength Daily</title>
    <meta name="description" content="A daily mental strength tracker for men. Build habits, track mood, journal, and level up your mind." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour (status bar on Android) -->
    <meta name="theme-color" content="#e85d04" />

    <!-- iOS home screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mind Forge" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Splash screen background colour for iOS -->
    <meta name="msapplication-TileColor" content="#e85d04" />

    <!-- Prevent phone number auto-linking -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="/icon-192.png" type="image/png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] registered', reg.scope))
            .catch(err => console.warn('[SW] registration failed', err));
        });
      }
    </script>
  </body>
</html>
